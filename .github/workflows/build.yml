name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos:
    name: Test and Package
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift Version
        run: swift --version

      - name: Test
        run: swift test

      - name: Build Debug
        run: swift build

      - name: Package App
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
          SIGN_IDENTITY: ${{ secrets.SIGN_IDENTITY }}
        run: |
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            VERSION="$GITHUB_REF_NAME"
          else
            VERSION="$(cat VERSION)"
          fi

          REQUIRE_NOTARIZATION=false
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            if [[ -n "${APPLE_ID:-}" && -n "${TEAM_ID:-}" && -n "${APP_SPECIFIC_PASSWORD:-}" && -n "${SIGN_IDENTITY:-}" ]]; then
              REQUIRE_NOTARIZATION=true
            else
              echo "Apple notarization secrets are incomplete; creating ad-hoc signed draft assets."
            fi
          fi

          REQUIRE_NOTARIZATION="$REQUIRE_NOTARIZATION" VERSION="$VERSION" ./scripts/verify-release-candidate.sh

      - name: Upload App Archive
        uses: actions/upload-artifact@v4
        with:
          name: Sub2APIStatusBar-macOS
          path: |
            dist/*.zip
            dist/*.dmg
            dist/*-manifest.json
            dist/sub2api-status-bar.rb
            dist/*.sha256
          if-no-files-found: error

      - name: Create Draft GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: false
          name: Sub2API Status Bar ${{ github.ref_name }}
          body_path: docs/RELEASE_NOTES_${{ github.ref_name }}.md
          files: |
            dist/*.zip
            dist/*.dmg
            dist/*-manifest.json
            dist/sub2api-status-bar.rb
            dist/*.sha256
