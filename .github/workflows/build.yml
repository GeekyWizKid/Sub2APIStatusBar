name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos:
    name: Test and Package
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift Version
        run: swift --version

      - name: Test
        run: swift test

      - name: Build Debug
        run: swift build

      - name: Package App
        run: |
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            VERSION="$GITHUB_REF_NAME"
          else
            VERSION="$(cat VERSION)"
          fi
          VERSION="$VERSION" ./scripts/verify-release-candidate.sh

      - name: Upload App Archive
        uses: actions/upload-artifact@v4
        with:
          name: Sub2APIStatusBar-macOS
          path: |
            dist/*.zip
            dist/*.dmg
            dist/*-manifest.json
            dist/*.sha256
          if-no-files-found: error

      - name: Create Draft GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: false
          name: Sub2API Status Bar ${{ github.ref_name }}
          body_path: docs/RELEASE_NOTES_${{ github.ref_name }}.md
          files: |
            dist/*.zip
            dist/*.dmg
            dist/*-manifest.json
            dist/*.sha256
